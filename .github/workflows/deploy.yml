name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --no-frozen-lockfile

      - name: 下载json文件
        env:
          OWNER: ${{ secrets.JSON_REPO_OWNER }}
          REPO: ${{ secrets.JSON_REPO_NAME }}
          TAG: jsons
          FILE: flist-json.tar.gz
        run: |
          URL="https://github.com/${OWNER}/${REPO}/releases/download/${TAG}/${FILE}"
          curl -L \
            -H "Authorization: Bearer ${{ secrets.JIANG_PAT_TOKEN }}" \
            -o ${FILE} \
            "$URL"
          tar -xzf ${FILE} -C mounts

      - name: 构建 VuePress
        run: pnpm build

      - name: 部署 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .vuepress/dist
          publish_branch: gh-pages
          force_orphan: true
